# Deploys the TanStack Start app in rome-places/ to Cloudflare Workers.
# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — Cloudflare API token (Edit Cloudflare Workers template)
#   CLOUDFLARE_ACCOUNT_ID — Account ID from wrangler whoami
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rome-places
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: rome-places/.nvmrc
          cache: npm
          cache-dependency-path: rome-places/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: rome-places
          command: deploy
