name: CI

on:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: rome-places

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: rome-places/package-lock.json
      - run: npm ci
      - run: npm run build
